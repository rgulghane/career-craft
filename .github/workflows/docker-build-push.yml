name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      IMAGE_NAME: uniconnect/training
      REGISTRY_RAW: ${{ secrets.REGISTRY_LOGIN_SERVER }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalize and validate registry
        id: registry
        shell: bash
        run: |
          REGISTRY="${REGISTRY_RAW}"

          if [ -z "${REGISTRY}" ]; then
            echo "REGISTRY_LOGIN_SERVER secret is missing. Set it to your ACR host (example: myregistry.azurecr.io)." >&2
            exit 1
          fi

          # Accept values with scheme/trailing slash and normalize to host[:port].
          REGISTRY="${REGISTRY#http://}"
          REGISTRY="${REGISTRY#https://}"
          REGISTRY="${REGISTRY%%/*}"

          if [ -z "${REGISTRY}" ]; then
            echo "REGISTRY_LOGIN_SERVER resolves to empty after normalization." >&2
            exit 1
          fi

          if ! [[ "${REGISTRY}" =~ ^[a-zA-Z0-9.-]+(:[0-9]+)?$ ]]; then
            echo "REGISTRY_LOGIN_SERVER must be a registry host like myregistry.azurecr.io (no path)." >&2
            exit 1
          fi

          echo "registry=${REGISTRY}" >> "${GITHUB_OUTPUT}"

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.registry.outputs.registry }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.registry.outputs.registry }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ steps.registry.outputs.registry }}/${{ env.IMAGE_NAME }}:latest
            ${{ steps.registry.outputs.registry }}/${{ env.IMAGE_NAME }}:0.1
          cache-from: type=gha
          cache-to: type=gha,mode=max