# Local production-image smoke test.
# Copy .env.docker.example → .env and set secrets before: docker compose up --build

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-mongodb://mongo:27017/career_craft}
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me-please-32chars-min}
      CRON_SECRET: ${CRON_SECRET:-dev-cron-secret}
      APP_ORIGIN: ${APP_ORIGIN:-http://localhost:3000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
      AZURE_STORAGE_CONNECTION_STRING: ${AZURE_STORAGE_CONNECTION_STRING:-}
      AZURE_STORAGE_ACCOUNT_NAME: ${AZURE_STORAGE_ACCOUNT_NAME:-}
      AZURE_STORAGE_CONTAINER_NAME: ${AZURE_STORAGE_CONTAINER_NAME:-mentor-photos}
      AZURE_STORAGE_PUBLIC_BASE_URL: ${AZURE_STORAGE_PUBLIC_BASE_URL:-}
      DB_CONNECT_MAX_ATTEMPTS: ${DB_CONNECT_MAX_ATTEMPTS:-30}
      DB_CONNECT_DELAY_MS: ${DB_CONNECT_DELAY_MS:-2000}
      REFERRAL_PRICE: ${REFERRAL_PRICE:-}
      CASH_PER_REFERRAL: ${CASH_PER_REFERRAL:-}
      REFUND_WINDOW_DAYS: ${REFUND_WINDOW_DAYS:-}
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "3000:3000"
    command: ["node", "apps/web/server.js"]

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  mongo_data:


    