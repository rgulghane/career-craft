# Local single-host deploy. Use for development of the production image and
# as a starting point for self-hosted setups (Fly, Render, bare VM, etc.).

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: career_craft
    ports:
      - "5432:5432"
    volumes:
      - cc_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d career_craft"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@db:5432/career_craft
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me-please-32chars-min}
      CRON_SECRET: ${CRON_SECRET:-dev-cron-secret}
      APP_ORIGIN: ${APP_ORIGIN:-http://localhost:3000}
    command: >
      sh -c "cd /app/apps/web && npx prisma migrate deploy &&
             cd /app && node apps/web/server.js"
    ports:
      - "3000:3000"

volumes:
  cc_pg_data:
