services:
  - type: web
    name: career-craft-web
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true
    # Indexes are created on first connect (connectMongo). preDeploy db:setup does not
    # work with the slim Docker standalone image (no tsx / scripts in the runtime).
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CRON_SECRET
        generateValue: true
      - key: APP_ORIGIN
        sync: false

  - type: cron
    name: career-craft-qualify-referrals
    runtime: image
    image:
      url: curlimages/curl:8.10.1
    schedule: "0 3 * * *"
    dockerCommand: sh -c "curl -fsS -X POST -H \"x-cron-secret: $CRON_SECRET\" \"$APP_ORIGIN/api/internal/qualify-referrals\""
    envVars:
      - key: CRON_SECRET
        fromService:
          type: web
          name: career-craft-web
          envVarKey: CRON_SECRET
      - key: APP_ORIGIN
        fromService:
          type: web
          name: career-craft-web
          envVarKey: APP_ORIGIN
